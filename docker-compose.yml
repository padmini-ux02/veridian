version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: veridian_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-veridian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veridian_secret}
      POSTGRES_DB: ${POSTGRES_DB:-veridian_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veridian -d veridian_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veridian_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-veridian}:${POSTGRES_PASSWORD:-veridian_secret}@db:5432/${POSTGRES_DB:-veridian_db}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production-9f8a7b6c5d4e3f2a1b0c}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./backend:/app
      - backend_models:/app/models
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: veridian_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_models:
  backend_logs:
